syntax = "proto3";

package protobufs;
import "protobufs/camera.proto";
import "protobufs/backend_algo_event.proto";
import "protobufs/optimization.proto";

// Go: generated under go/autosave
option go_package = "omnicam.com/gen/go/protobufs";

message AutosaveResponse {
  int32 last_updated_version = 1;
}

message ProtoEventResponse{
  oneof resp{
    AutosaveResponse               autosave = 1;
    protobufs.OptimizationResponse optimize = 2;
  }
}